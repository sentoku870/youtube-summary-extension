<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 要約 - 設定</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <h1>⚙ 設定</h1>

    <div class="tab-container" role="tablist" aria-label="設定カテゴリ">
      <button
        type="button"
        class="tab-btn active"
        data-tab="tab-models"
        role="tab"
        aria-selected="true"
        aria-controls="tab-models"
        id="tab-btn-models"
      >
        📋 モデル管理
      </button>
      <button
        type="button"
        class="tab-btn"
        data-tab="tab-buttons"
        role="tab"
        aria-selected="false"
        aria-controls="tab-buttons"
        id="tab-btn-buttons"
      >
        🧩 ボタン・プロンプト
      </button>
      <button
        type="button"
        class="tab-btn"
        data-tab="tab-display"
        role="tab"
        aria-selected="false"
        aria-controls="tab-display"
        id="tab-btn-display"
      >
        🪟 表示設定
      </button>
    </div>

    <!-- ===== Tab: モデル管理 ===== -->
    <div
      id="tab-models"
      class="tab-content active"
      role="tabpanel"
      aria-labelledby="tab-btn-models"
    >
      <div class="tab-pane-header">
        <div>
          <h2 class="tab-pane-title">📋 モデル管理</h2>
          <p class="tab-pane-desc">
            API設定を登録・編集・削除できます。登録したモデルは各ボタンで選択できます。
          </p>
        </div>
      </div>

      <div class="model-toolbar">
        <button type="button" id="addModelBtn" class="primary">+ モデルを追加</button>
        <div class="toolbar-search">
          <label for="modelSearchInput" class="visually-hidden">モデルを検索</label>
          <input
            type="search"
            id="modelSearchInput"
            placeholder="🔍 ラベル・モデル・ホストで検索..."
            autocomplete="off"
          />
        </div>
      </div>

      <ul id="modelList" class="model-list" aria-live="polite"></ul>
    </div>

    <!-- ===== Tab: ボタン・プロンプト ===== -->
    <div
      id="tab-buttons"
      class="tab-content"
      role="tabpanel"
      aria-labelledby="tab-btn-buttons"
      hidden
    >
      <div class="tab-pane-header">
        <div>
          <h2 class="tab-pane-title">🧩 ボタン・プロンプト</h2>
          <p class="tab-pane-desc">
            サイドバーの3つのボタンと使用するモデルを設定します。変更は自動で保存されます。
          </p>
        </div>
      </div>

      <div class="btn-preview-row" aria-label="サイドバーボタンのプレビュー">
        <span class="preview-label">プレビュー:</span>
        <span class="btn-preview btn-preview-summary">📝 A</span>
        <span class="btn-preview btn-preview-customA">📊 B</span>
        <span class="btn-preview btn-preview-customB">💡 C</span>
      </div>

      <div class="button-cards" id="buttonCards"></div>
      <div class="auto-save-indicator" id="buttonsAutoSaveStatus" aria-live="polite"></div>
    </div>

    <!-- ===== Tab: 表示設定 ===== -->
    <div
      id="tab-display"
      class="tab-content"
      role="tabpanel"
      aria-labelledby="tab-btn-display"
      hidden
    >
      <div class="tab-pane-header">
        <div>
          <h2 class="tab-pane-title">🪟 表示設定</h2>
          <p class="tab-pane-desc">変更は自動で保存されます。</p>
        </div>
      </div>

      <div class="field">
        <label>テーマ</label>
        <div class="theme-cards" id="themeCards" role="radiogroup" aria-label="テーマ選択">
          <!-- JS で生成 -->
        </div>
      </div>

      <div class="field">
        <label for="fontSize">フォントサイズ（サイドバー内の文字サイズ）</label>
        <div class="number-input-with-presets">
          <input
            type="number"
            id="fontSize"
            min="10"
            max="24"
            step="1"
            placeholder="13"
            inputmode="numeric"
          />
          <div
            class="preset-chips"
            id="fontSizePresets"
            role="group"
            aria-label="フォントサイズプリセット"
          ></div>
        </div>
      </div>

      <div class="field">
        <label for="panelHeight">パネルの高さ上限（これを超えるとスクロール表示）</label>
        <div class="number-input-with-presets">
          <input
            type="number"
            id="panelHeight"
            min="400"
            max="2000"
            step="10"
            placeholder="1100"
            inputmode="numeric"
          />
          <div
            class="preset-chips"
            id="panelHeightPresets"
            role="group"
            aria-label="パネル高さプリセット"
          ></div>
        </div>
        <div class="note">出力が長いときはこの高さでスクロールバーが表示されます</div>
      </div>

      <hr />

      <h2>🎬 字幕設定</h2>
      <div class="field">
        <label for="subtitleLang">言語</label>
        <select id="subtitleLang">
          <option value="auto">自動（字幕リストの先頭）</option>
          <option value="ja">日本語</option>
          <option value="en">英語</option>
          <option value="zh">中国語</option>
          <option value="ko">韓国語</option>
          <option value="es">スペイン語</option>
          <option value="fr">フランス語</option>
          <option value="de">ドイツ語</option>
          <option value="it">イタリア語</option>
          <option value="pt">ポルトガル語</option>
          <option value="ru">ロシア語</option>
          <option value="vi">ベトナム語</option>
          <option value="th">タイ語</option>
          <option value="id">インドネシア語</option>
          <option value="ar">アラビア語</option>
          <option value="hi">ヒンディー語</option>
        </select>
        <div class="note">指定した言語の字幕が利用可能な場合、優先的に使用されます。</div>
      </div>

      <div class="auto-save-indicator" id="displayAutoSaveStatus" aria-live="polite"></div>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
