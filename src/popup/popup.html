<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 要約</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        min-width: 200px;
        text-align: center;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px 0;
      }
      button {
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        margin: 2px 0;
        width: 100%;
      }
      button:hover {
        opacity: 0.85;
      }
      #dlBtn {
        background-color: #2d8c3c;
        color: white;
      }
      #dlBtn:disabled {
        background-color: #bbb !important;
        cursor: not-allowed;
      }
      #settingsBtn {
        background-color: #888;
        color: white;
      }
      .status {
        font-size: 11px;
        color: #888;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube 要約</h1>
    <button id="dlBtn" disabled>💾 字幕DL</button>
    <button id="settingsBtn">⚙ 設定</button>
    <div class="status" id="statusText">YouTube動画のページを開いて字幕を取得してください</div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
