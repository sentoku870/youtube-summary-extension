<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 要約</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 12px;
      min-width: 200px;
      text-align: center;
    }
    h1 { font-size: 15px; margin: 0 0 8px 0; }
    button {
      border: none; padding: 8px 16px; border-radius: 4px;
      font-size: 13px; cursor: pointer; margin: 2px 0; width: 100%;
    }
    button:hover { opacity: 0.85; }
    #dlBtn { background-color: #2d8c3c; color: white; }
    #dlBtn:disabled { background-color: #bbb !important; cursor: not-allowed; }
    #settingsBtn { background-color: #888; color: white; }
    .status { font-size: 11px; color: #888; margin-top: 6px; }
    .ai-btn { margin-top: 4px; }
    .ai-btn:disabled { background-color: #bbb !important; cursor: not-allowed; }
    #summaryBtn { background-color: #cc0000; color: white; }
    #customABtn { background-color: #1565c0; color: white; }
    #customBBtn { background-color: #2e7d32; color: white; }
    .section-title { font-size: 12px; font-weight: bold; margin: 10px 0 4px 0; color: #555; text-align: left; }
  </style>
</head>
<body>
  <h1>YouTube 要約</h1>
  <button id="dlBtn" disabled>💾 字幕DL</button>
  <div class="section-title">🤖 AI処理</div>
  <button id="summaryBtn" class="ai-btn" disabled>📝 要約</button>
  <button id="customABtn" class="ai-btn" disabled>📊 分析（ボタンA）</button>
  <button id="customBBtn" class="ai-btn" disabled>💡 考察（ボタンB）</button>
  <button id="settingsBtn">⚙ 設定</button>
  <div class="status" id="statusText">YouTube動画のページを開いて字幕を取得してください</div>

    <script type="module" src="popup.js"></script>
</body>
</html>
